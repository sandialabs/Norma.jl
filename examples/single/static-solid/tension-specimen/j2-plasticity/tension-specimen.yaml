type: single
input mesh file: tension-specimen.g
output mesh file: tension-specimen.e
Exodus output interval: 1
CSV output interval: 0
model:
  type: solid mechanics
  material:
    blocks:
      tension: hyperelastic
    hyperelastic:
      model: j2 plasticity
      elastic modulus: 70.0e+09
      Poisson's ratio: 0.36
      density: 2700.0
      yield stress: 250.0e+06
      hardening modulus: 0.7e+09
time integrator:
  type: quasi static
  initial time: 0.0
  final time: 1.0
  time step: 0.01
boundary conditions:
  Dirichlet:
    - node set: sym_y
      component: y
      function: "0.0"
    - node set: sym_x
      component: x
      function: "0.0"
    - node set: sym_z
      component: z
      function: "0.0"
    - node set: top_y
      component: y
      function: "0.005 * t"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 0
  maximum iterations: 16
  relative tolerance: 1.0e-12
  absolute tolerance: 1.0e-08
  use line search: true
