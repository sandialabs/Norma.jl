type: single
input mesh file: ../standard/cube.g
output mesh file: cube.e
CSV output interval: 0
model:
  type: solid mechanics
  material:
    blocks:
      cube: hyperelastic
    hyperelastic:
      model: j2 plasticity
      elastic modulus: 70.0e+09
      Poisson's ratio: 0.25
      density: 1000.0
      yield stress: 250.0e+06
      hardening modulus: 0.7e+09
time integrator:
  type: quasi static
  initial time: 0.0
  final time: 1.0
  time step: 0.1
boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "0.0"
    - node set: nsy-
      component: y
      function: "0.0"
    - node set: nsz-
      component: z
      function: "0.0"
    - node set: nsz+
      component: z
      function: "0.01 * t"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 0
  maximum iterations: 16
  relative tolerance: 1.0e-12
  absolute tolerance: 1.0e-08
