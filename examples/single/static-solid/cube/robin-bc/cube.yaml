type: single
input mesh file: cube.g
output mesh file: cube.e
Exodus output interval: 1
CSV output interval: 0
model:
  type: solid mechanics
  material:
    blocks:
      cube: elastic
    elastic:
      model: linear elastic
      elastic modulus: 1.0e+09
      Poisson's ratio: 0.25
      density: 1000.0
time integrator:
  type: quasi static
  initial time: 0.0
  final time: 1.0
  time step: 0.1
boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "0.0"
    - node set: nsy-
      component: y
      function: "0.0"
    - node set: nsz-
      component: z
      function: "0.0"
  Robin:
    - side set: ssz+
      component: z
      # BC: traction_z + robin_parameter * disp_z = function(t, x, y, z)
      # With robin_parameter = E = 1e9, g = 1e6*t:
      #   eps_z = g / (E + robin_parameter) = 1e6 / (1e9 + 1e9) = 5e-4
      robin parameter: 1.0e+09
      function: "1.0e+06 * t"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 1
  maximum iterations: 16
  relative tolerance: 1.0e-14
  absolute tolerance: 1.0e-10
