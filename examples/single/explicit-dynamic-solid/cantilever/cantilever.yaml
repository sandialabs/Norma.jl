type: single
input mesh file: cantilever.g
output mesh file: cantilever.e
model:
  type: solid mechanics
  material:
    blocks:
      cantilever: hyperelastic
    hyperelastic:
      model: linear elastic
      elastic modulus: 6.895e+09
      Poisson's ratio: 0.25
      density: 2768.0
time integrator:
  type: central difference
  initial time: 0.0
  final time: 3.0e-6
  CFL: 0.2
  γ: 0.5
initial conditions:
  displacement:
    - node set: nsall
      component: y
      function: "0.393701 * x * x"
boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "0.0"
    - node set: nsx-
      component: y
      function: "0.0"
    - node set: nsx-
      component: z
      function: "0.0"
solver:
    type: explicit solver
    step: explicit
