boundary conditions:
  Schwarz contact:
  - friction type: frictionless
    side set: ssx-
    source: bar-1.yaml
    source block: fine
    source side set: ssx+
    swap BC types: false
initial conditions:
  displacement:
  - component: x
    function: "-5.1359 * t"
    node set: nsall
input mesh file: bar-2.g
model:
  material:
    blocks:
      coarse: elastic
    elastic:
      Poisson's ratio: 0.25
      density: 7844.1
      elastic modulus: 206840000000.0
      model: linear elastic
  type: solid mechanics
output mesh file: bar-2.e
solver:
  absolute tolerance: 0.001
  maximum iterations: 16
  minimum iterations: 1
  relative tolerance: 1.0e-07
  step: full Newton
  type: Hessian minimizer
time integrator:
  type: Newmark
  β: 0.25
  γ: 0.5
type: single
