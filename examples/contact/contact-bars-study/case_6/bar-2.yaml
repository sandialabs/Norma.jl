boundary conditions:
  Schwarz contact:
  - friction type: frictionless
    side set: ssx-
    source: bar-1.yaml
    source block: fine
    source side set: ssx+
initial conditions:
  displacement:
  - component: x
    function: "1.0e-04"
    node set: nsall
  velocity:
  - component: x
    function: "-100.0"
    node set: nsall
input mesh file: bar-2.g
model:
  material:
    blocks:
      coarse: elastic
    elastic:
      Poisson's ratio: 0.25
      density: 1000.0
      elastic modulus: 1000000000.0
      model: linear elastic
  type: solid mechanics
output mesh file: bar-2.e
solver:
  step: explicit
  type: explicit solver
time integrator:
  CFL: 0.1
  type: central difference
  γ: 0.5
type: single
