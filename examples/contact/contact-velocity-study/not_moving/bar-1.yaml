boundary conditions:
  Schwarz contact:
  - friction type: frictionless
    side set: ssx+
    source: bar-2.yaml
    source block: coarse
    source side set: ssx-
    swap BC types: false
initial conditions:
  displacement:
  - component: x
    function: "1.0 * t"
    node set: nsall
input mesh file: bar-1.g
model:
  material:
    blocks:
      fine: elastic
    elastic:
      Poisson's ratio: 0.25
      density: 1000.0
      elastic modulus: 1000000000
      model: linear elastic
  type: solid mechanics
output mesh file: bar-1.e
solver:
  absolute tolerance: 1.0e-08
  maximum iterations: 16
  minimum iterations: 1
  relative tolerance: 1.0e-10
  step: full Newton
  type: Hessian minimizer
time integrator:
  type: Newmark
  β: 0.25
  γ: 0.5
type: single
