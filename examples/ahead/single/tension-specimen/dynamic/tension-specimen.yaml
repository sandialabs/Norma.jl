type: single
input mesh file: ../tension-specimen.g
output mesh file: tension-specimen.e
CSV output interval: 0
model:
  type: solid mechanics
  material:
    blocks:
      tension: hyperelastic
    hyperelastic:
      model: neohookean
      elastic modulus: 1.0e+09
      Poisson's ratio: 0.25
      density: 1000.0
time integrator:
  type: Newmark
  β: 0.25
  γ: 0.5
  initial time: 0.0
  final time: 1.0
  time step: 0.01
boundary conditions:
  Dirichlet:
    - node set: sym_y
      component: y
      function: "0.0"
    - node set: sym_x
      component: x
      function: "0.0"
    - node set: sym_z
      component: z
      function: "0.0"
    - node set: top_y
      component: y
      function: "0.005 * 0.5 * (1.0 - cos(pi*t))"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 1
  maximum iterations: 16
  relative tolerance: 1.0e-07
  absolute tolerance: 1.0e-05
