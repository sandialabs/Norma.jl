type: single
input mesh file: ../cantilever.g
output mesh file: cantilever.e
model:
  type: solid mechanics
  material:
    blocks:
      cantilever: hyperelastic
    hyperelastic:
      model: linear elastic
      elastic modulus: 1.0e+06
      Poisson's ratio: 0.25
      density: 2.61e-4
time integrator:
  type: Newmark
  initial time: 0.0
  final time: 3.0e-6
  time step: 1.0e-6
  β: 0.25
  γ: 0.5
initial conditions:
  displacement:
    - node set: nsall
      component: y
      function: "0.01 * x * x"
boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "0.0"
    - node set: nsx-
      component: y
      function: "0.0"
    - node set: nsx-
      component: z
      function: "0.0"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 1
  maximum iterations: 16
  relative tolerance: 1.0e-10
  absolute tolerance: 1.0e-06
